name: TikTok Hashtag Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run scraper and sync via Lovable endpoint
        env:
          TIKTOK_HASHTAG: starhotels
        run: node scripts/sync-tiktok-hashtag.mjs
